version: '3.8'

services:
  backend:
    build:
      context: ./multisolution-server
      dockerfile: Dockerfile
    container_name: multisolution-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./multisolution-server/.env.production
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./multisolution-server/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - multisolution-network

  # Frontend service (to be added)
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #   container_name: multisolution-frontend
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - multisolution-network

networks:
  multisolution-network:
    driver: bridge
